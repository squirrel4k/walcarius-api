
type Action {
    id: ID!
    name: String!
    natureValues: JSON!
    actionGroupId: ID!
    actionGroup: ActionGroup!
    matterId: ID
    matter: Matter
}

input FilterAction {
    actionGroupId: ID
    matterId: ID
    thickness: Float
    section: Float
    diameter: Float
}

type Query {
    searchAction(actionGroupId: ID, search: String): [Action!]!
    getActionByParameters(actionGroupId: ID, params: FilterAction): Action
    getActionByThickness(actionGroupId: ID, params: FilterAction): Action
}